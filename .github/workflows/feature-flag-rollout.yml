name: Feature Flag Rollout
on:
  workflow_dispatch:
    inputs:
      flag_name:
        description: '全体展開するフラグ名（空欄ですべて展開）'
        required: false
        default: ''

jobs:
  rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: フラグを全体展開
        run: |
          python3 << 'PYEOF'
          import re, os

          flag_name = os.environ.get('FLAG_NAME', '').strip()

          with open('app/_lib/feature-flag.js') as f:
              content = f.read()

          if flag_name:
              pattern = rf'(const {re.escape(flag_name)}\s*=\s*\[)([\s\S]*?)(\])'
              new_content = re.sub(pattern, r'\1\n\3', content)
              if new_content == content:
                  print(f"フラグ '{flag_name}' が見つかりませんでした")
                  exit(1)
              print(f"'{flag_name}' を全体展開しました")
          else:
              new_content = re.sub(r'(const \w+\s*=\s*\[)([\s\S]*?)(\])', r'\1\n\3', content)
              print("すべてのフラグを全体展開しました")

          with open('app/_lib/feature-flag.js', 'w') as f:
              f.write(new_content)
          PYEOF
        env:
          FLAG_NAME: ${{ inputs.flag_name }}

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/_lib/feature-flag.js
          if git diff --staged --quiet; then
            echo "変更なし（すでに全体展開済み）"
            exit 0
          fi
          FLAG="${{ inputs.flag_name }}"
          LABEL="${FLAG:-すべてのフラグ}"
          git commit -m "feat: ${LABEL} を全体展開"
          git push origin main
