name: Auto Fix Bug
on:
  issues:
    types: [labeled]
jobs:
  fix:
    if: github.event.label.name == 'bugfix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude Code で修正
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 40 --model claude-sonnet-4-6"
          prompt: |
            Issue #${{ github.event.issue.number }} のバグを修正してください。
            Issue本文に該当ファイル名と行番号が書かれている場合は、まずそのファイルを直接開いて該当箇所を修正してください。コードベース全体の調査は最小限にしてください。
            手順:
            1. Issue本文を読み、該当ファイル・該当箇所を特定する
            2. ブランチ名は必ず fix/issue-${{ github.event.issue.number }} にする
            3. 修正を行い、変更を説明したPRを作成する。PR本文に Closes #${{ github.event.issue.number }} を含める
            CLAUDE.md の規約に従い、小さく安全な変更にとどめること。
      - name: PRを探してDiscordへ通知
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PR_URL=$(gh pr list --state open --head "fix/issue-${{ github.event.issue.number }}" --json url --jq '.[0].url // empty')
          if [ -z "$PR_URL" ]; then
            MSG="🔧 Issue #${{ github.event.issue.number }} を処理しました。PRが見つからないのでGitHubを確認してください。"
          else
            MSG="✅ Issue #${{ github.event.issue.number }} の修正PRができました\n$PR_URL\n確認して問題なければマージしてください。"
          fi
          curl -s -H "Content-Type: application/json" -d "{\"content\":\"$MSG\"}" "$DISCORD_WEBHOOK_URL"
