name: Feature Flag Reminder
on:
  schedule:
    - cron: '0 1 * * 2,5'  # 火・金 10:00 JST (UTC+9)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: フィーチャーフラグ確認 & Discord通知
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import re, json, os

          with open('app/_lib/feature-flag.js') as f:
              content = f.read()

          matches = re.findall(r'const (\w+)\s*=\s*\[([\s\S]*?)\]', content)
          active = []
          for name, body in matches:
              emails = re.findall(r"'([^']+)'", body)
              if emails:
                  active.append(f"• {name}: {', '.join(emails)}")

          if not active:
              print("アクティブなフィーチャーフラグなし、通知スキップ")
              exit(0)

          rollout_url = "https://github.com/rnrx8/seo-saas/actions/workflows/feature-flag-rollout.yml"
          msg = (
              "🚩 **アクティブなフィーチャーフラグがあります**\n"
              + "\n".join(active)
              + f"\n\n全体展開する場合はこちら → {rollout_url}"
          )
          import subprocess
          payload = json.dumps({"content": msg})
          subprocess.run(
              ["curl", "-s", "-H", "Content-Type: application/json", "-d", payload, os.environ["DISCORD_WEBHOOK_URL"]],
              check=True
          )
          print("Discord通知送信完了")
          PYEOF
